<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Graphviz DOT in HTML</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        #graph {
            text-align: center;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<h1>Graphviz DOT Embedded in HTML</h1>
<p>Enter DOT language code below and click "Render Graph".</p>

<!-- DOT input -->
<textarea id="dotInput">
digraph G {
    // Outer cluster
    subgraph cluster_outer {
        label = "Outer Cluster";
        style = filled;
        color = lightgrey;

        // First inner cluster
        subgraph cluster_inner1 {
            label = "Inner Cluster 1";
            style = filled;
            color = lightblue;

            A1 -> A2;
            A2 -> A3;
        }

        // Second inner cluster
        subgraph cluster_inner2 {
            label = "Inner Cluster 2";
            style = filled;
            color = lightpink;

            B1 -> B2;
            B2 -> B3;
        }

        // Connect nodes across inner clusters
        A3 -> B1;
    }

    // Node outside clusters
    X [shape=box, style=filled, color=yellow];
    B3 -> X;
}

    </textarea>
<br>
<button onclick="renderGraph()">Render Graph</button>

<!-- Graph output -->
<div id="graph"></div>

<!-- Viz.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/viz.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/full.render.js"></script>

<script>
    function renderGraph() {
        const dot = document.getElementById("dotInput").value;
        const viz = new Viz();

        viz.renderSVGElement(dot)
            .then(function(element) {
                const graphDiv = document.getElementById("graph");
                graphDiv.innerHTML = ""; // Clear previous graph
                graphDiv.appendChild(element);
            })
            .catch(function(error) {
                console.error(error);
                alert("Error rendering graph. Check your DOT syntax.");
            });
    }

    // Render initial graph on page load
    window.onload = renderGraph;
</script>
</body>
</html>
